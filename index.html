<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>西鉄バス謎解きチャレンジ_ver.K</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">
</head>
<body>

<h2>🎯 ミッション</h2>
<p id="missionText"></p>

<input id="answer" placeholder="キーワード入力">
<button onclick="checkAnswer()">送信</button>

<p id="result"></p>

<script>
let missions = [];
let current = 0;

async function loadMissions() {
  const res = await fetch("missions.json");
  missions = await res.json();
  loadMission();
}

function loadMission() {
  document.getElementById("missionText").innerText =
    `ミッション${current + 1}/${missions.length}：${missions[current].text}`;
  
  document.getElementById("result").innerText = "";
  document.getElementById("answer").value = "";
}

function checkAnswer() {
  const input = document.getElementById("answer").value.trim();

  if (input.includes(missions[current].answer)) {
    document.getElementById("result").innerText = "🎉 クリア！";

    setTimeout(() => {
      current++;

      if (current < missions.length) {
        loadMission();
      } else {
        document.getElementById("missionText").innerText = "🏆 全ミッションクリア！";
      }
    }, 1000);

  } else {
    document.getElementById("result").innerText = "❌ 違う！";
  }
}

loadMissions();

window.addEventListener('load', () => {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./service-worker.js')
      .then(() => console.log("Service Worker 登録成功"))
      .catch(err => console.log("登録失敗", err));
  }
});
</script>

</body>
</html>
